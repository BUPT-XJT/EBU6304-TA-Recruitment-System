<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse Positions - BUPT TA Recruitment</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-layout">
  <nav class="sidebar"></nav>
  <main class="main-content">
    <div class="main-top">
      <div><h2>Browse Positions</h2><div class="mt-desc">Find and apply for TA positions</div></div>
    </div>

    <div class="search-bar">
      <input class="search-input" id="searchInput" placeholder="Search positions by course name, code, or skills..." oninput="filterPositions()">
      <select class="form-select" id="deptFilter" style="width:200px" onchange="filterPositions()">
        <option value="">All Departments</option>
      </select>
    </div>

    <div class="job-grid" id="positionGrid"></div>

    <div class="modal-overlay" id="detailModal">
      <div class="modal" id="detailContent"></div>
    </div>
  </main>
</div>

<script src="/js/app.js"></script>
<script>
const user = requireLogin('TA');
let allPositions = [];
let myApps = [];
if (user) init();

async function init() {
  renderSidebar('TA', 'positions');
  [allPositions, myApps] = await Promise.all([
    api('/positions?status=APPROVED'),
    api('/applications?taId=' + user.id)
  ]);

  const depts = [...new Set(allPositions.map(p => p.department))];
  const sel = document.getElementById('deptFilter');
  depts.forEach(d => { const o = document.createElement('option'); o.value = d; o.textContent = d; sel.appendChild(o); });

  renderPositions(allPositions);
}

function filterPositions() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const dept = document.getElementById('deptFilter').value;
  const filtered = allPositions.filter(p => {
    const matchText = (p.courseName + ' ' + p.courseCode + ' ' + p.requiredSkills).toLowerCase().includes(q);
    const matchDept = !dept || p.department === dept;
    return matchText && matchDept;
  });
  renderPositions(filtered);
}

function renderPositions(positions) {
  const grid = document.getElementById('positionGrid');
  if (positions.length === 0) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="es-icon">💼</div><div class="es-text">No positions found</div></div>';
    return;
  }
  grid.innerHTML = positions.map(p => {
    const skills = (p.requiredSkills || '').split(';').filter(Boolean);
    const applied = myApps.some(a => a.positionId === p.id);
    return `
    <div class="job-card">
      <div class="jc-top">
        <div>
          <div class="jc-title">${escapeHtml(p.courseName)}</div>
          <div class="jc-dept">${p.courseCode} · ${p.department}</div>
        </div>
        <span class="badge badge-success">Open</span>
      </div>
      <div class="jc-info">
        <span>👥 ${p.numPositions} positions</span>
        <span>⏱ ${p.hoursPerWeek}h/week</span>
        <span>💰 ${p.payRate}</span>
      </div>
      <div class="jc-tags">${skills.map(s => '<span class="tag">' + escapeHtml(s) + '</span>').join('')}</div>
      <div class="jc-bottom">
        <span class="jc-deadline">Deadline: ${p.deadline}</span>
        ${applied
          ? '<span class="badge badge-info">Applied</span>'
          : '<button class="btn btn-primary btn-sm" onclick="showDetail(\'' + p.id + '\')">View & Apply</button>'}
      </div>
    </div>`;
  }).join('');
}

function showDetail(id) {
  const p = allPositions.find(x => x.id === id);
  if (!p) return;
  const skills = (p.requiredSkills || '').split(';').filter(Boolean);
  const duties = (p.duties || '').split('\n').filter(Boolean);
  const applied = myApps.some(a => a.positionId === p.id);

  document.getElementById('detailContent').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:start">
      <h3>${escapeHtml(p.courseName)}</h3>
      <button class="btn btn-secondary btn-sm" onclick="closeModal()">✕</button>
    </div>
    <div style="color:var(--gray-400);font-size:13px;margin-bottom:16px">${p.courseCode} · ${p.department} · Posted by ${escapeHtml(p.moName)}</div>
    <div class="grid-2" style="margin-bottom:16px">
      <div><strong style="font-size:12px;color:var(--gray-500)">Positions</strong><div style="font-size:15px;font-weight:700">${p.numPositions}</div></div>
      <div><strong style="font-size:12px;color:var(--gray-500)">Hours/Week</strong><div style="font-size:15px;font-weight:700">${p.hoursPerWeek}</div></div>
      <div><strong style="font-size:12px;color:var(--gray-500)">Pay Rate</strong><div style="font-size:15px;font-weight:700">${p.payRate}</div></div>
      <div><strong style="font-size:12px;color:var(--gray-500)">Deadline</strong><div style="font-size:15px;font-weight:700">${p.deadline}</div></div>
    </div>
    <div style="margin-bottom:16px"><strong style="font-size:12px;color:var(--gray-500)">Required Skills</strong><div style="margin-top:6px">${skills.map(s => '<span class="tag">' + escapeHtml(s) + '</span>').join('')}</div></div>
    <div style="margin-bottom:20px"><strong style="font-size:12px;color:var(--gray-500)">Duties</strong><ul style="margin-top:6px;padding-left:20px;font-size:13px;color:var(--gray-600)">${duties.map(d => '<li>' + escapeHtml(d) + '</li>').join('')}</ul></div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      ${applied
        ? '<span class="badge badge-info" style="padding:8px 18px;font-size:13px">Already Applied</span>'
        : '<button class="btn btn-primary" onclick="applyPosition(\'' + p.id + '\',\'' + escapeHtml(p.courseName) + '\',\'' + p.courseCode + '\')">Apply Now</button>'}
    </div>`;
  document.getElementById('detailModal').classList.add('show');
}

function closeModal() { document.getElementById('detailModal').classList.remove('show'); }

async function applyPosition(posId, title, code) {
  try {
    await api('/applications', {
      method: 'POST',
      body: JSON.stringify({
        taId: user.id, taName: user.name,
        positionId: posId, positionTitle: title + ' TA', courseCode: code
      })
    });
    toast('Application submitted!');
    closeModal();
    myApps = await api('/applications?taId=' + user.id);
    renderPositions(allPositions);
  } catch (err) {
    toast(err.message, 'error');
  }
}

document.getElementById('detailModal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
</script>
</body>
</html>
